<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ItsLeo.Iso Photography</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: white;
            font-family: Arial, sans-serif;
            color: black;
        }

        /* HEADER */
        header {
            width: 100%;
            background: black;
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        header a {
            color: white;
            text-decoration: none;
            font-size: 20px;
        }

        /* PHOTO GRID */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 40px;
        }

        .photo-placeholder {
            width: 100%;
            padding-bottom: 100%; /* perfect square */
            background: black;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">ItsLeo.Iso</div>
        <a href="https://www.instagram.com/itsleo.iso/" target="_blank">
            &#x1F465; Insta
        </a>
    </header>

    <div class="gallery">
        <div class="photo-placeholder"></div>
        <div class="photo-placeholder"></div>
        <div class="photo-placeholder"></div>
        <div class="photo-placeholder"></div>
        <div class="photo-placeholder"></div>
    </div>

</body>
</html>
