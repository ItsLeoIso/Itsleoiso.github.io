<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ItsLeo.Iso Photography</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: white;
            font-family: Times New Roman, sans-serif;
            color: black;
        }

        /* HEADER */
        header {
            width: 100%;
            background: black;
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        header a {
            color: white;
            text-decoration: none;
            font-size: 20px;
        }

        /* NAVIGATION LINKS CONTAINER */
        .nav-links {
            display: flex;
            gap: 20px; /* Space between links */
            align-items: center;
        }

        /* PHOTO GRID */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 40px;
        }

        .photo {
            width: 100%;
            overflow: hidden;
            aspect-ratio: 1 / 1; /* maintain square shape */
        }

        .photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">ItsLeo.Iso</div>
        <div class="nav-links"> <a href="about.html">About</a>
            <a href="https://www.instagram.com/itsleo.iso/" target="_blank">
                &#x1F465; Insta
            </a>
        </div>
    </header>

    <div class="gallery">
        <div class="photo"><img src="Assets/DSC_0765.jpg" alt="Photo 1" /></div>
        <div class="photo"><img src="Assets/DSC_0783.jpg" alt="Photo 2" /></div>
        <div class="photo"><img src="Assets/DSC_0792.jpg" alt="Photo 3" /></div>
    </div>
</body>
</html>
